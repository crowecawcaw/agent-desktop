name: E2E Linux

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            at-spi2-core \
            xvfb \
            xdotool \
            scrot \
            xclip \
            dbus-x11 \
            mutter \
            gedit \
            libatk1.0-0 \
            libatk-bridge2.0-0

      - name: Build
        run: cargo build --verbose

      - name: Start Xvfb, D-Bus, AT-SPI2, window manager, and GUI app
        run: |
          # Start virtual X display
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          export DISPLAY=:99

          # Start a D-Bus session
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
          echo "DISPLAY=:99" >> $GITHUB_ENV

          # Enable AT-SPI2 accessibility
          export GTK_MODULES=gail:atk-bridge
          export NO_AT_BRIDGE=0
          echo "GTK_MODULES=gail:atk-bridge" >> $GITHUB_ENV
          echo "NO_AT_BRIDGE=0" >> $GITHUB_ENV

          # Start AT-SPI2 registry
          /usr/libexec/at-spi2-registryd &
          sleep 1

          # Start window manager (mutter in nested mode)
          mutter --replace --sm-disable --x11 2>/dev/null &
          sleep 2

          # Launch gedit as our test app
          gedit --new-window &
          sleep 2

          echo "=== Environment probe ==="
          echo "DISPLAY=$DISPLAY"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS"
          xdotool getactivewindow getwindowname 2>&1 || echo "No active window"
          xdotool search --name "" 2>&1 | head -5 || echo "No windows found"
          pgrep -a gedit || echo "gedit not running"
          pgrep -a mutter || echo "mutter not running"
          pgrep -a at-spi2 || echo "at-spi2 not running"

      # --- Tests that should succeed ---

      - name: "Test: screenshot captures a file"
        run: |
          ./target/debug/agent-desktop screenshot --output /tmp/screen.png
          test -f /tmp/screen.png
          SIZE=$(stat -c%s /tmp/screen.png)
          test "$SIZE" -gt 100  # should be a real image

      - name: "Test: observe returns XML with elements"
        run: |
          OUTPUT=$(./target/debug/agent-desktop observe 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '<application'

      - name: "Test: observe --app gedit returns elements"
        run: |
          OUTPUT=$(./target/debug/agent-desktop observe --app gedit 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '<'

      - name: "Test: observe --list-roles shows role counts"
        run: |
          OUTPUT=$(./target/debug/agent-desktop observe --list-roles 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qE '[a-z_]+.*[0-9]+'

      - name: "Test: observe with query filter"
        run: |
          ./target/debug/agent-desktop observe --app gedit > /dev/null 2>&1 || true
          OUTPUT=$(./target/debug/agent-desktop observe -q 'window' 2>&1)
          echo "$OUTPUT"
          test -n "$OUTPUT"

      - name: "Test: observe JSON format"
        run: |
          OUTPUT=$(./target/debug/agent-desktop observe --app gedit --format json 2>&1)
          echo "$OUTPUT" | head -5
          echo "$OUTPUT" | head -1 | grep -qE '^\[|\{'

      - name: "Test: focus --app gedit"
        run: |
          OUTPUT=$(./target/debug/agent-desktop focus --app gedit 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi 'Focused'

      - name: "Test: read --clipboard returns JSON"
        run: |
          # Seed clipboard first — xclip fails on empty clipboard
          echo -n "test content" | xclip -selection clipboard
          OUTPUT=$(./target/debug/agent-desktop read --clipboard 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q 'clipboard'

      - name: "Test: click at coordinates"
        run: |
          ./target/debug/agent-desktop click --x 100 --y 100 2>&1
          echo "Click succeeded"

      - name: "Test: scroll down"
        run: |
          ./target/debug/agent-desktop scroll --direction down 2>&1
          echo "Scroll succeeded"

      - name: "Test: key press"
        run: |
          ./target/debug/agent-desktop key --name escape 2>&1
          echo "Key press succeeded"

      - name: "Test: type text"
        run: |
          ./target/debug/agent-desktop focus --app gedit > /dev/null 2>&1 || true
          ./target/debug/agent-desktop type --text "hello from CI" 2>&1
          echo "Type succeeded"

      - name: "Test: observe then click element by query"
        run: |
          ./target/debug/agent-desktop observe --app gedit > /dev/null 2>&1
          OUTPUT=$(./target/debug/agent-desktop click --app gedit -q 'window' 2>&1) || true
          echo "$OUTPUT"

      # --- Tests for expected failures ---

      - name: "Test: observe with invalid app fails gracefully"
        run: |
          OUTPUT=$(./target/debug/agent-desktop observe --app NonExistentApp 2>&1) && exit 1 || true
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi 'not found\|error'

      - name: "Test: click without element or coords fails"
        run: |
          OUTPUT=$(./target/debug/agent-desktop click 2>&1) && exit 1 || true
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi 'element\|required'
