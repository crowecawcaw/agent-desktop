name: E2E Windows

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Launch Notepad and save PID
        id: notepad
        shell: pwsh
        run: |
          Start-Process notepad
          Start-Sleep -Seconds 2
          $proc = Get-Process notepad -ErrorAction SilentlyContinue | Select-Object -First 1
          Write-Host "Notepad PID: $($proc.Id), Title: $($proc.MainWindowTitle)"
          echo "PID=$($proc.Id)" >> $env:GITHUB_OUTPUT

      - name: Run e2e tests
        shell: pwsh
        run: .\e2e\e2e-windows.ps1 -Bin .\target\debug\agent-desktop.exe -NotepadPid ${{ steps.notepad.outputs.PID }}
